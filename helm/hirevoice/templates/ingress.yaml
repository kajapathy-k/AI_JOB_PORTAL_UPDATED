{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hirevoice
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "hirevoice.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingress
  annotations:
    alb.ingress.kubernetes.io/scheme: {{ .Values.ingress.scheme | quote }}
    alb.ingress.kubernetes.io/target-type: {{ .Values.ingress.targetType | quote }}
    alb.ingress.kubernetes.io/listen-ports: {{ .Values.ingress.listenPorts | toJson | quote }}
    alb.ingress.kubernetes.io/healthcheck-path: {{ .Values.ingress.healthcheckPath | quote }}
    alb.ingress.kubernetes.io/success-codes: {{ .Values.ingress.successCodes | quote }}
    alb.ingress.kubernetes.io/transforms.hirevoice-gateway: >
      [{"type":"url-rewrite","urlRewriteConfig":{"rewrites":[{"regex":"^/api/?(.*)$","replace":"/$1"}]}}]
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: hirevoice-gateway
                port:
                  number: {{ .Values.services.gateway.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hirevoice-frontend
                port:
                  number: {{ .Values.services.frontend.port }}
{{- end }}
