apiVersion: apps/v1
kind: Deployment
metadata:
  name: hirevoice-frontend
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "hirevoice.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.services.frontend.replicas }}
  selector:
    matchLabels:
      {{- include "hirevoice.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "hirevoice.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      {{- include "hirevoice.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: frontend
          image: {{ include "hirevoice.frontendImage" . }}
          imagePullPolicy: {{ .Values.images.frontend.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.services.frontend.port }}
          envFrom:
            - configMapRef:
                name: hirevoice-frontend-config
          {{- include "hirevoice.httpProbes" . | nindent 10 }}
          resources:
            {{- toYaml .Values.services.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: hirevoice-frontend
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "hirevoice.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    {{- include "hirevoice.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: {{ .Values.services.frontend.port }}
      targetPort: http
