apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: groq-api-key
  namespace: {{ .Values.hirevoiceNamespace | quote }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: groq-api-key
    creationPolicy: Owner
  data:
    - secretKey: GROQ_API_KEY
      remoteRef:
        key: {{ .Values.groqSecretName | quote }}
