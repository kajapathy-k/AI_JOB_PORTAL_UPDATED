name: HireVoice CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
      - eks-migration
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: hirevoice-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  config:
    name: Resolve CI Configuration
    runs-on: ubuntu-latest
    outputs:
      aws_account_id: ${{ steps.config.outputs.aws_account_id }}
      aws_region: ${{ steps.config.outputs.aws_region }}
      aws_role_to_assume: ${{ steps.config.outputs.aws_role_to_assume }}
      backend_ecr_repository: ${{ steps.config.outputs.backend_ecr_repository }}
      frontend_ecr_repository: ${{ steps.config.outputs.frontend_ecr_repository }}
      sonar_host_url: ${{ steps.config.outputs.sonar_host_url }}
      sonar_project_key: ${{ steps.config.outputs.sonar_project_key }}
      sonar_project_name: ${{ steps.config.outputs.sonar_project_name }}
      sonar_organization: ${{ steps.config.outputs.sonar_organization }}
      snyk_severity_threshold: ${{ steps.config.outputs.snyk_severity_threshold }}
      vite_api_url: ${{ steps.config.outputs.vite_api_url }}
    steps:
      - name: Resolve variables
        id: config
        env:
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
          BACKEND_ECR_REPOSITORY: ${{ vars.BACKEND_ECR_REPOSITORY }}
          FRONTEND_ECR_REPOSITORY: ${{ vars.FRONTEND_ECR_REPOSITORY }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_PROJECT_NAME: ${{ vars.SONAR_PROJECT_NAME }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SNYK_SEVERITY_THRESHOLD: ${{ vars.SNYK_SEVERITY_THRESHOLD }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: |
          echo "aws_account_id=${AWS_ACCOUNT_ID:-768979069805}" >> "$GITHUB_OUTPUT"
          echo "aws_region=${AWS_REGION:-us-east-1}" >> "$GITHUB_OUTPUT"
          echo "aws_role_to_assume=$AWS_ROLE_TO_ASSUME" >> "$GITHUB_OUTPUT"
          echo "backend_ecr_repository=${BACKEND_ECR_REPOSITORY:-hirevoice-backend}" >> "$GITHUB_OUTPUT"
          echo "frontend_ecr_repository=${FRONTEND_ECR_REPOSITORY:-hirevoice-frontend}" >> "$GITHUB_OUTPUT"
          echo "sonar_host_url=$SONAR_HOST_URL" >> "$GITHUB_OUTPUT"
          echo "sonar_project_key=$SONAR_PROJECT_KEY" >> "$GITHUB_OUTPUT"
          echo "sonar_project_name=${SONAR_PROJECT_NAME:-HireVoice}" >> "$GITHUB_OUTPUT"
          echo "sonar_organization=$SONAR_ORGANIZATION" >> "$GITHUB_OUTPUT"
          echo "snyk_severity_threshold=${SNYK_SEVERITY_THRESHOLD:-critical}" >> "$GITHUB_OUTPUT"
          echo "vite_api_url=${VITE_API_URL:-/api}" >> "$GITHUB_OUTPUT"

  sonarqube:
    name: SonarQube
    needs: config
    uses: ./.github/workflows/sonarqube.yml
    with:
      sonar_host_url: ${{ needs.config.outputs.sonar_host_url }}
      sonar_project_key: ${{ needs.config.outputs.sonar_project_key }}
      sonar_project_name: ${{ needs.config.outputs.sonar_project_name }}
      sonar_organization: ${{ needs.config.outputs.sonar_organization }}
    secrets: inherit

  snyk:
    name: Snyk
    needs:
      - config
      - sonarqube
    uses: ./.github/workflows/snyk.yml
    with:
      severity_threshold: ${{ needs.config.outputs.snyk_severity_threshold }}
    secrets: inherit

  docker-build:
    name: Docker Build
    needs:
      - config
      - snyk
    uses: ./.github/workflows/docker-build.yml
    with:
      image_tag: ${{ github.sha }}
      vite_api_url: ${{ needs.config.outputs.vite_api_url }}

  trivy:
    name: Trivy
    needs:
      - docker-build
    uses: ./.github/workflows/trivy.yml
    with:
      backend_image: ${{ needs.docker-build.outputs.backend_image }}
      frontend_image: ${{ needs.docker-build.outputs.frontend_image }}
      backend_image_artifact: ${{ needs.docker-build.outputs.backend_image_artifact }}
      frontend_image_artifact: ${{ needs.docker-build.outputs.frontend_image_artifact }}
      severity_threshold: HIGH,CRITICAL

  ecr-push:
    name: ECR Push
    needs:
      - config
      - docker-build
      - trivy
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/ecr-push.yml
    with:
      aws_region: ${{ needs.config.outputs.aws_region }}
      aws_role_to_assume: ${{ needs.config.outputs.aws_role_to_assume }}
      backend_ecr_repository: ${{ needs.config.outputs.backend_ecr_repository }}
      frontend_ecr_repository: ${{ needs.config.outputs.frontend_ecr_repository }}
      image_tag: ${{ github.sha }}
      backend_image: ${{ needs.docker-build.outputs.backend_image }}
      frontend_image: ${{ needs.docker-build.outputs.frontend_image }}
      backend_image_artifact: ${{ needs.docker-build.outputs.backend_image_artifact }}
      frontend_image_artifact: ${{ needs.docker-build.outputs.frontend_image_artifact }}
      push_enabled: true

  helm-validate:
    name: Helm Validation
    needs:
      - config
      - trivy
      - ecr-push
    if: always() && needs.trivy.result == 'success' && (needs.ecr-push.result == 'success' || needs.ecr-push.result == 'skipped')
    uses: ./.github/workflows/helm-validate.yml
    with:
      aws_account_id: ${{ needs.config.outputs.aws_account_id }}
      aws_region: ${{ needs.config.outputs.aws_region }}
      backend_ecr_repository: ${{ needs.config.outputs.backend_ecr_repository }}
      frontend_ecr_repository: ${{ needs.config.outputs.frontend_ecr_repository }}
      image_tag: ${{ github.sha }}

  notify:
    name: Notification
    needs:
      - config
      - sonarqube
      - snyk
      - docker-build
      - trivy
      - ecr-push
      - helm-validate
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout notification action
        uses: actions/checkout@v4

      - name: Send pipeline notification
        uses: ./.github/actions/send-notification
        with:
          status: ${{ (needs.sonarqube.result == 'success' && needs.snyk.result == 'success' && needs.docker-build.result == 'success' && needs.trivy.result == 'success' && (needs.ecr-push.result == 'success' || needs.ecr-push.result == 'skipped') && needs.helm-validate.result == 'success') && 'success' || 'failure' }}
          notification_type: ${{ (needs.sonarqube.result == 'failure' || needs.snyk.result == 'failure' || needs.trivy.result == 'failure') && 'security-gate-failure' || 'general' }}
          smtp_server: ${{ secrets.SMTP_SERVER }}
          smtp_port: ${{ secrets.SMTP_PORT }}
          smtp_username: ${{ secrets.SMTP_USERNAME }}
          smtp_password: ${{ secrets.SMTP_PASSWORD }}
          email_to: ${{ vars.NOTIFICATION_EMAIL_TO }}
          email_from: ${{ vars.NOTIFICATION_EMAIL_FROM }}
          subject: HireVoice CI ${{ (needs.sonarqube.result == 'success' && needs.snyk.result == 'success' && needs.docker-build.result == 'success' && needs.trivy.result == 'success' && (needs.ecr-push.result == 'success' || needs.ecr-push.result == 'skipped') && needs.helm-validate.result == 'success') && 'succeeded' || 'failed' }} - ${{ github.ref_name }} - ${{ github.sha }}
          body: |
            HireVoice CI completed.

            Repository: ${{ github.repository }}
            Ref: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Stage results:
            SonarQube: ${{ needs.sonarqube.result }}
            Snyk: ${{ needs.snyk.result }}
            Docker Build: ${{ needs.docker-build.result }}
            Trivy: ${{ needs.trivy.result }}
            ECR Push: ${{ needs.ecr-push.result }}
            Helm Validation: ${{ needs.helm-validate.result }}
