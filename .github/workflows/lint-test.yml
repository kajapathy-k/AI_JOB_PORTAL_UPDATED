name: Lint and Test

on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint-test:
    name: Existing Tooling Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate backend Python syntax
        run: python -m compileall -q backend

      - name: Run backend pytest when configured
        run: |
          if find backend -type f \( -name 'test_*.py' -o -name '*_test.py' \) | grep -q . || \
             [ -f backend/pytest.ini ] || [ -f backend/pyproject.toml ] || [ -f backend/setup.cfg ] || [ -f backend/tox.ini ]; then
            python -m pip install --upgrade pip
            python -m pip install -r backend/requirements.txt pytest
            python -m pytest backend
          else
            echo "::notice::No backend pytest tests or pytest configuration found; pytest skipped."
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint when configured
        working-directory: frontend
        run: |
          if node -e "const scripts=require('./package.json').scripts || {}; process.exit(scripts.lint ? 0 : 1)"; then
            npm run lint
          else
            echo "::notice::No frontend lint script found; lint skipped."
          fi

      - name: Run frontend tests when configured
        working-directory: frontend
        run: |
          if node -e "const scripts=require('./package.json').scripts || {}; process.exit(scripts.test ? 0 : 1)"; then
            npm test
          else
            echo "::notice::No frontend test script found; npm test skipped."
          fi

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: /api
        run: npm run build
