name: Snyk

on:
  workflow_call:
    inputs:
      severity_threshold:
        description: Minimum severity that fails the Snyk gate.
        required: false
        type: string
        default: critical

permissions:
  contents: read

jobs:
  snyk:
    name: Dependency Security Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Validate Snyk configuration
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: test -n "$SNYK_TOKEN" || (echo "SNYK_TOKEN secret is required." && exit 1)

      - name: Prepare report directory
        run: mkdir -p reports

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scan backend dependencies
        id: snyk_backend
        continue-on-error: true
        working-directory: backend
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: >
          snyk test
          --file=requirements.txt
          --package-manager=pip
          --severity-threshold=${{ inputs.severity_threshold }}
          --fail-on=all
          --json-file-output=../reports/snyk-backend.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Scan frontend dependencies
        id: snyk_frontend
        continue-on-error: true
        working-directory: frontend
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: >
          snyk test
          --severity-threshold=${{ inputs.severity_threshold }}
          --fail-on=all
          --json-file-output=../reports/snyk-frontend.json

      - name: Upload Snyk reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-reports
          path: reports/**
          if-no-files-found: warn
          retention-days: 14

      - name: Enforce Snyk security gate
        run: |
          if [[ "${{ steps.snyk_backend.outcome }}" == "failure" || "${{ steps.snyk_frontend.outcome }}" == "failure" ]]; then
            echo "Snyk security gate failed."
            exit 1
          fi
          echo "Snyk security gate passed."
