name: Terraform Plan

on:
  workflow_call:
    inputs:
      aws_region:
        description: AWS region.
        required: true
        type: string
      aws_role_to_assume:
        description: IAM role ARN assumed through GitHub OIDC.
        required: true
        type: string
      terraform_version:
        description: Terraform CLI version.
        required: false
        type: string
        default: 1.6.6
      terraform_var_file:
        description: Optional tfvars file path relative to the Terraform working directory.
        required: false
        type: string
        default: ''
      require_real_secrets:
        description: Require production secrets instead of CI placeholders.
        required: false
        type: boolean
        default: false
    secrets:
      GROQ_API_KEY:
        description: Groq API key supplied to Terraform as TF_VAR_groq_api_key.
        required: false
    outputs:
      plan_artifact:
        description: Terraform plan artifact name.
        value: ${{ jobs.terraform-plan.outputs.plan_artifact }}
  workflow_dispatch:
    inputs:
      terraform_var_file:
        description: Optional tfvars file path relative to terraform/.
        required: false
        type: string
        default: ''

permissions:
  contents: read
  id-token: write

jobs:
  terraform-plan:
    name: Plan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      plan_artifact: ${{ steps.meta.outputs.plan_artifact }}
    defaults:
      run:
        working-directory: terraform
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
      TF_VAR_groq_api_key: ${{ secrets.GROQ_API_KEY || 'ci-placeholder-not-for-apply' }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set metadata
        id: meta
        working-directory: .
        run: echo "plan_artifact=terraform-plan-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Validate required configuration
        working-directory: .
        env:
          AWS_ROLE_TO_ASSUME: ${{ inputs.aws_role_to_assume || vars.AWS_ROLE_TO_ASSUME }}
        run: test -n "$AWS_ROLE_TO_ASSUME" || (echo "AWS_ROLE_TO_ASSUME variable is required." && exit 1)

      - name: Validate Terraform secrets
        working-directory: .
        env:
          REQUIRE_REAL_SECRETS: ${{ inputs.require_real_secrets }}
        run: |
          if [[ "$REQUIRE_REAL_SECRETS" == "true" && "$TF_VAR_groq_api_key" == "ci-placeholder-not-for-apply" ]]; then
            echo "GROQ_API_KEY secret is required for Terraform apply planning."
            exit 1
          fi

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws_role_to_assume || vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ inputs.aws_region || vars.AWS_REGION || 'us-east-1' }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version || '1.6.6' }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate -no-color

      - name: Terraform plan
        env:
          TERRAFORM_VAR_FILE: ${{ inputs.terraform_var_file }}
        run: |
          mkdir -p ../artifacts/terraform
          plan_args="-input=false -out=../artifacts/terraform/hirevoice.tfplan"
          if [[ -n "$TERRAFORM_VAR_FILE" ]]; then
            plan_args="$plan_args -var-file=$TERRAFORM_VAR_FILE"
          fi
          set +e
          terraform plan -no-color $plan_args > ../artifacts/terraform/hirevoice-plan.log 2>&1
          plan_status=$?
          cat ../artifacts/terraform/hirevoice-plan.log
          set -e
          if [[ "$plan_status" -ne 0 ]]; then
            error_tail="$(tail -n 25 ../artifacts/terraform/hirevoice-plan.log)"
            error_tail="${error_tail//'%'/'%25'}"
            error_tail="${error_tail//$'\n'/'%0A'}"
            error_tail="${error_tail//$'\r'/'%0D'}"
            echo "::error title=Terraform plan failed::$error_tail"
            exit "$plan_status"
          fi
          terraform show -no-color ../artifacts/terraform/hirevoice.tfplan > ../artifacts/terraform/hirevoice-plan.txt

      - name: Upload Terraform plan
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.plan_artifact }}
          path: artifacts/terraform/**
          if-no-files-found: error
          retention-days: 14
