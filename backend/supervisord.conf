[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:auth]
command=python -m uvicorn services.auth.main:app --host 0.0.0.0 --port 9001
directory=/app
environment=PYTHONPATH="/app"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

