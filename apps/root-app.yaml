apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kajapathy-k/AI_JOB_PORTAL_UPDATED.git
    targetRevision: personal-account-gitops
    path: apps
    directory:
      include: "{external-secrets-resources-app.yaml,hirevoice-app.yaml}"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
